<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACO Live Trash Detection</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #0c0c0c;
    color: #e8e8e8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 40px;
    gap: 0;
  }

  header {
    text-align: center;
    margin-bottom: 22px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.2px;
    color: #f0f0f0;
  }

  header p {
    font-size: 12.5px;
    color: #666;
    margin-top: 4px;
  }

  /* ── Video area ─────────────────────────────── */
  .stage {
    position: relative;
    width: 100%;
    max-width: 720px;
    background: #141414;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid #222;
    aspect-ratio: 16 / 9;
  }

  #localVideo, #remoteVideo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #localVideo  { z-index: 1; opacity: 1; transition: opacity 0.4s; }
  #remoteVideo { z-index: 2; opacity: 0; transition: opacity 0.4s; }
  #remoteVideo.active { opacity: 1; }
  #localVideo.dimmed  { opacity: 0.15; }

  /* overlay canvas for manual bbox (fallback when no annotated stream) */
  #bboxCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  /* status pill */
  .pill {
    position: absolute;
    top: 11px;
    left: 11px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 5px 12px 5px 8px;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.1px;
    user-select: none;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #3a3a3a;
    flex-shrink: 0;
    transition: background 0.25s, box-shadow 0.25s;
  }
  .dot.idle     { background: #3a3a3a; }
  .dot.ready    { background: #3b82f6; box-shadow: 0 0 6px #3b82f6; }
  .dot.live     { background: #22c55e; box-shadow: 0 0 7px #22c55e; }
  .dot.thinking { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
  .dot.error    { background: #ef4444; }

  .count-pill {
    position: absolute;
    top: 11px;
    right: 11px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    font-weight: 500;
    color: #22c55e;
  }

  /* placeholder when camera not started */
  .placeholder {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #3a3a3a;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .placeholder svg { opacity: 0.5; }
  .placeholder span { font-size: 13px; }

  /* ── Controls ───────────────────────────────── */
  .controls {
    display: flex;
    gap: 9px;
    width: 100%;
    max-width: 720px;
    margin-top: 13px;
  }

  button {
    flex: 1;
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid #2c2c2c;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    background: #1a1a1a;
    color: #e0e0e0;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
  }
  button:hover:not(:disabled)  { background: #222; border-color: #3a3a3a; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.38; cursor: not-allowed; }

  button.go {
    background: #22c55e;
    border-color: #22c55e;
    color: #000;
    font-weight: 600;
  }
  button.go:hover:not(:disabled) { background: #16a34a; border-color: #16a34a; }

  button.halt {
    border-color: #ef4444;
    color: #ef4444;
  }
  button.halt:hover:not(:disabled) { background: #1a0808; }

  /* ── Settings ───────────────────────────────── */
  .section-label {
    width: 100%;
    max-width: 720px;
    font-size: 10.5px;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-top: 18px;
    margin-bottom: 6px;
  }

  .settings-box {
    width: 100%;
    max-width: 720px;
    background: #131313;
    border: 1px solid #202020;
    border-radius: 10px;
    padding: 14px 16px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: #888;
    margin-bottom: 10px;
  }
  .setting-row:last-child { margin-bottom: 0; }
  .setting-row label { min-width: 140px; }
  .setting-row input[type="range"] { flex: 1; accent-color: #22c55e; cursor: pointer; }
  .setting-row span { min-width: 46px; text-align: right; color: #ccc; font-weight: 500; font-size: 12px; }
  .setting-row select {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: #ccc;
    padding: 4px 8px;
    font-size: 12.5px;
  }

  /* ── Stats ──────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    width: 100%;
    max-width: 720px;
    margin-top: 0;
  }

  .stat {
    background: #131313;
    border: 1px solid #202020;
    border-radius: 10px;
    padding: 11px 13px;
    text-align: center;
  }
  .stat-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.6px; }
  .stat-val { font-size: 22px; font-weight: 600; margin-top: 3px; color: #22c55e; }
  .stat-val.neutral { color: #ccc; }

  /* ── Detection list ─────────────────────────── */
  .det-list {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 0;
  }

  .det-item {
    display: flex;
    align-items: center;
    background: #131313;
    border: 1px solid #202020;
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 12.5px;
    animation: pop 0.12s ease;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }

  .det-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 9px; }
  .det-cls { font-weight: 500; flex: 0 0 auto; min-width: 72px; }
  .bar-wrap { flex: 1; height: 3px; background: #222; border-radius: 2px; margin: 0 14px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
  .det-pct  { font-size: 11.5px; color: #666; min-width: 32px; text-align: right; }

  .empty-msg { font-size: 12.5px; color: #444; padding: 8px 0; }

  /* ── Error banner ───────────────────────────── */
  #errorBanner {
    display: none;
    width: 100%;
    max-width: 720px;
    margin-top: 12px;
    background: #180a0a;
    border: 1px solid #3a1818;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 12.5px;
    color: #f87171;
  }
</style>
</head>
<body>

<header>
  <h1>🗑️ TACO Live Trash Detection</h1>
  <p>Real-time detection via Roboflow WebRTC — no page reloads, no polling</p>
</header>

<!-- Video stage -->
<div class="stage" id="stage">
  <video id="localVideo"  autoplay playsinline muted></video>
  <video id="remoteVideo" autoplay playsinline muted></video>
  <canvas id="bboxCanvas"></canvas>

  <div class="pill">
    <span class="dot idle" id="dot"></span>
    <span id="statusTxt">Waiting</span>
  </div>
  <div class="count-pill" id="countPill" style="display:none">0 items</div>

  <div class="placeholder" id="placeholder">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
      <path d="M23 7l-7 5 7 5V7z"/>
      <rect x="1" y="5" width="15" height="14" rx="2"/>
    </svg>
    <span>Click Start to begin live detection</span>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="go" id="startBtn" onclick="startStream()">▶ Start camera</button>
  <button class="halt" id="stopBtn"  onclick="stopStream()" disabled>■ Stop</button>
</div>

<!-- Settings -->
<div class="section-label">Detection settings</div>
<div class="settings-box">
  <div class="setting-row">
    <label>Confidence threshold</label>
    <input type="range" id="confSlider" min="0.10" max="0.95" step="0.05" value="0.35"
           oninput="confThreshold=parseFloat(this.value); document.getElementById('confVal').textContent=Math.round(this.value*100)+'%'">
    <span id="confVal">35%</span>
  </div>
  <div class="setting-row">
    <label>Display mode</label>
    <select id="displayMode" onchange="displayMode=this.value; applyDisplayMode()">
      <option value="annotated">Annotated stream (from Roboflow)</option>
      <option value="local">Raw camera + draw boxes locally</option>
    </select>
  </div>
  <div class="setting-row">
    <label>Box color</label>
    <select id="colorMode" onchange="colorMode=this.value">
      <option value="class">Color by class</option>
      <option value="confidence">Color by confidence</option>
      <option value="green">Solid green</option>
    </select>
  </div>
</div>

<!-- Stats -->
<div class="section-label">Live stats</div>
<div class="stats-grid">
  <div class="stat"><div class="stat-lbl">Items found</div><div class="stat-val"  id="sCount">0</div></div>
  <div class="stat"><div class="stat-lbl">Frames received</div><div class="stat-val neutral" id="sFrames">0</div></div>
  <div class="stat"><div class="stat-lbl">Unique classes</div><div class="stat-val neutral" id="sClasses">0</div></div>
</div>

<!-- Detection list -->
<div class="section-label">Current detections</div>
<div class="det-list" id="detList">
  <div class="empty-msg">No detections yet.</div>
</div>

<!-- Error -->
<div id="errorBanner"></div>

<!-- Roboflow inference-sdk via CDN (ESM) -->
<script type="module">
// ─────────────────────────────────────────────────────────────
//  Config — edit these if needed
// ─────────────────────────────────────────────────────────────
const API_KEY       = 'zs2Fpdr6GYFftsJ7kQws';
const WORKSPACE     = 'dylans-workspace-gchst';
const WORKFLOW_ID   = 'trash-detection-workflow-1782289148660';
const IMAGE_INPUT   = 'image';
// Your workflow's output names — adjust if yours differ
const STREAM_OUTPUT = 'annotated_image';   // the visualised video track output name
const DATA_OUTPUT   = 'predictions';       // the JSON predictions output name

// ─────────────────────────────────────────────────────────────
const CLASS_COLORS = {
  paper:'#60a5fa', plastic:'#f472b6', glass:'#34d399',
  metal:'#fb923c', cardboard:'#a78bfa'
};
const DEFAULT_COLOR = '#22c55e';

let confThreshold = 0.35;
let colorMode     = 'class';
let displayMode   = 'annotated';
let connection    = null;
let localStream   = null;
let framesRx      = 0;
let seenClasses   = new Set();

// DOM refs
const localVid   = document.getElementById('localVideo');
const remoteVid  = document.getElementById('remoteVideo');
const canvas     = document.getElementById('bboxCanvas');
const ctx        = canvas.getContext('2d');
const placeholder= document.getElementById('placeholder');
const startBtn   = document.getElementById('startBtn');
const stopBtn    = document.getElementById('stopBtn');
const countPill  = document.getElementById('countPill');

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusTxt').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}

function applyDisplayMode() {
  if (displayMode === 'annotated') {
    remoteVid.classList.add('active');
    localVid.classList.add('dimmed');
    canvas.style.display = 'none';
  } else {
    remoteVid.classList.remove('active');
    localVid.classList.remove('dimmed');
    canvas.style.display = 'block';
  }
}

function colorFor(item) {
  if (colorMode === 'green') return DEFAULT_COLOR;
  if (colorMode === 'confidence') {
    const c = item.confidence;
    return c > 0.75 ? '#22c55e' : c > 0.5 ? '#f59e0b' : '#ef4444';
  }
  return CLASS_COLORS[(item.class||'').toLowerCase()] || DEFAULT_COLOR;
}

function syncCanvas() {
  const r = localVid.getBoundingClientRect();
  canvas.width  = r.width;
  canvas.height = r.height;
}

function drawBoxes(items) {
  syncCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!items.length) return;

  const sx = canvas.width  / (localVid.videoWidth  || canvas.width);
  const sy = canvas.height / (localVid.videoHeight || canvas.height);
  const lw = Math.max(1.5, canvas.width * 0.003);
  const fs = Math.max(11, canvas.width * 0.018);

  items.forEach(item => {
    const w  = item.width  * sx, h = item.height * sy;
    const x0 = item.x * sx - w/2, y0 = item.y * sy - h/2;
    const color = colorFor(item);
    const label = `${(item.class||'?').replace(/_/g,' ')} ${Math.round(item.confidence*100)}%`;

    ctx.strokeStyle = color;
    ctx.lineWidth   = lw;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 5;
    ctx.strokeRect(x0, y0, w, h);
    ctx.shadowBlur  = 0;

    ctx.font = `500 ${fs}px system-ui,sans-serif`;
    const tw = ctx.measureText(label).width;
    const th = fs + 6;
    const ty = y0 > th + 4 ? y0 - th : y0 + 2;

    ctx.fillStyle = color;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x0, ty, tw+12, th, 4);
    else ctx.rect(x0, ty, tw+12, th);
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.fillText(label, x0+6, ty+th-5);
  });
}

function renderList(items) {
  const list = document.getElementById('detList');
  if (!items.length) {
    list.innerHTML = '<div class="empty-msg">No items above threshold.</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const cls   = (item.class||'unknown').toLowerCase();
    const color = CLASS_COLORS[cls] || DEFAULT_COLOR;
    const pct   = Math.round(item.confidence * 100);
    const label = cls.charAt(0).toUpperCase() + cls.slice(1).replace(/_/g,' ');
    return `<div class="det-item">
      <span class="det-dot" style="background:${color}"></span>
      <span class="det-cls">${label}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <span class="det-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function handlePredictions(data) {
  framesRx++;
  document.getElementById('sFrames').textContent = framesRx;

  // Roboflow returns data as the workflow's data output name at top level,
  // OR nested under outputs. Try both.
  let rawPreds = null;
  if (data && typeof data === 'object') {
    // data might be { predictions: { predictions: [...] } } or { predictions: [...] }
    const p = data[DATA_OUTPUT] ?? data.predictions ?? data;
    if (Array.isArray(p)) rawPreds = p;
    else if (p && Array.isArray(p.predictions)) rawPreds = p.predictions;
    else if (p && typeof p === 'object') {
      // some workflows wrap in outputs array
      const keys = Object.keys(p);
      for (const k of keys) {
        if (Array.isArray(p[k])) { rawPreds = p[k]; break; }
      }
    }
  }

  const items = (rawPreds || []).filter(x => (x.confidence||0) >= confThreshold);

  items.forEach(x => seenClasses.add((x.class||'').toLowerCase()));
  document.getElementById('sCount').textContent   = items.length;
  document.getElementById('sClasses').textContent = seenClasses.size;
  countPill.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

  if (displayMode === 'local') drawBoxes(items);
  renderList(items);
}

// ─────────────────────────────────────────────────────────────
//  Stream lifecycle
// ─────────────────────────────────────────────────────────────
window.startStream = async function() {
  hideError();
  startBtn.disabled = true;
  setStatus('thinking', 'Requesting camera…');

  try {
    // Get local camera
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    localVid.srcObject = localStream;
    placeholder.style.display = 'none';
    countPill.style.display = 'block';
    setStatus('thinking', 'Connecting to Roboflow…');

    // Import Roboflow SDK from CDN
    const { connectors, webrtc, streams } = await import(
      'https://cdn.jsdelivr.net/npm/@roboflow/inference-sdk@0.0.7/dist/index.esm.js'
    );

    const connector = connectors.withApiKey(API_KEY);

    const mediaStream = await streams.useCamera({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    connection = await webrtc.useStream({
      source: mediaStream,
      connector,
      wrtcParams: {
        workspaceName:    WORKSPACE,
        workflowId:       WORKFLOW_ID,
        imageInputName:   IMAGE_INPUT,
        streamOutputNames: [STREAM_OUTPUT],
        dataOutputNames:  [DATA_OUTPUT],
      },
      onData: (data) => {
        handlePredictions(data);
      }
    });

    // Show annotated remote stream
    const remote = await connection.remoteStream();
    remoteVid.srcObject = remote;
    applyDisplayMode();

    setStatus('live', 'Live');
    stopBtn.disabled = false;
    document.getElementById('displayMode').disabled = false;

  } catch (err) {
    console.error(err);
    setStatus('error', 'Error');
    showError(err.message || String(err));
    startBtn.disabled = false;
    // Fallback: if SDK fails, try polling mode
    if (localStream) startPollingFallback();
  }
};

window.stopStream = async function() {
  try { if (connection) await connection.cleanup(); } catch(_){}
  connection = null;
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  localStream = null;
  clearInterval(window._pollTimer);
  localVid.srcObject  = null;
  remoteVid.srcObject = null;
  remoteVid.classList.remove('active');
  localVid.classList.remove('dimmed');
  canvas.style.display = 'none';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  placeholder.style.display = 'flex';
  countPill.style.display = 'none';
  setStatus('idle', 'Waiting');
  startBtn.disabled = false;
  stopBtn.disabled  = true;
  renderList([]);
  framesRx = 0; seenClasses.clear();
  document.getElementById('sFrames').textContent = '0';
  document.getElementById('sCount').textContent  = '0';
  document.getElementById('sClasses').textContent= '0';
};

// ─────────────────────────────────────────────────────────────
//  Polling fallback (if WebRTC SDK unavailable/blocked)
// ─────────────────────────────────────────────────────────────
const pollCapture = document.createElement('canvas');
const pollCtx     = pollCapture.getContext('2d');

async function pollOnce() {
  if (!localVid.videoWidth) return;
  pollCapture.width  = localVid.videoWidth;
  pollCapture.height = localVid.videoHeight;
  pollCtx.drawImage(localVid, 0, 0);
  const b64 = pollCapture.toDataURL('image/jpeg', 0.8).split(',')[1];

  try {
    const res = await fetch(
      `https://serverless.roboflow.com/infer/workflows/${WORKSPACE}/${WORKFLOW_ID}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_key: API_KEY,
          inputs: {
            image: { type: 'base64', value: b64 },
            classes: 'paper, plastic, glass, metal, cardboard'
          }
        })
      }
    );
    const data = await res.json();
    const out  = (data.outputs && data.outputs[0]) ? data.outputs[0] : data;
    handlePredictions(out);
    setStatus('live', 'Live (polling)');
  } catch(e) {
    console.warn('poll error', e);
  }
}

function startPollingFallback() {
  // display local video with canvas overlay
  displayMode = 'local';
  document.getElementById('displayMode').value = 'local';
  applyDisplayMode();
  setStatus('live', 'Live (polling)');
  stopBtn.disabled = false;
  clearInterval(window._pollTimer);
  window._pollTimer = setInterval(pollOnce, 900);
  pollOnce();
}

window.addEventListener('resize', () => {
  if (localStream) syncCanvas();
});
</script>

</body>
</html>
